<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif; }
  body { background:#050505; width:918px; color:#fff; }
  .sheet { padding:34px 36px 48px; }
  h1 { text-align:center; font-size:30px; font-weight:800; letter-spacing:-.3px; }
  .sub { text-align:center; font-size:14px; font-weight:700; letter-spacing:3px; color:#8a8a8a; margin-top:8px; }
  .sub b { color:#3ddc6e; }
  .part { text-align:center; font-size:13px; font-weight:700; letter-spacing:3px; color:#8a8a8a; margin-top:54px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:44px 42px; margin-top:34px; }
  .col { display:flex; flex-direction:column; align-items:center; }
  .label { font-size:13px; font-weight:700; letter-spacing:3px; color:#8a8a8a; margin-bottom:18px; }
  .phone { width:392px; background:#101010; border:1px solid #2a2a2a; border-radius:52px; padding:12px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .frame { border-radius:42px; overflow:hidden; height:846px; }
  iframe { width:368px; height:846px; border:none; display:block; }
</style>
</head>
<body>
<div class="sheet">
  <h1>Fairway Sips</h1>
  <div class="sub">DESIGN V2 · <b>ALL 12 SCREENS</b> · LIVE DEMO</div>

  <div class="part">PART 1 · GOLFER</div>
  <div class="grid">
    <div class="col"><div class="label">01 · COURSE PICKER</div><div class="phone"><div class="frame"><iframe src="index.html?embed#picker"></iframe></div></div></div>
    <div class="col"><div class="label">02 · HOME · LIVE MAP</div><div class="phone"><div class="frame"><iframe src="index.html?embed#home"></iframe></div></div></div>
    <div class="col"><div class="label">03 · MENU · BROWSE</div><div class="phone"><div class="frame"><iframe src="index.html?embed#menu"></iframe></div></div></div>
    <div class="col"><div class="label">04 · DRINK BUILDER</div><div class="phone"><div class="frame"><iframe src="index.html?embed#builder"></iframe></div></div></div>
    <div class="col"><div class="label">05 · CHECKOUT</div><div class="phone"><div class="frame"><iframe src="index.html?embed#checkout"></iframe></div></div></div>
    <div class="col"><div class="label">06 · LIVE TRACKING</div><div class="phone"><div class="frame"><iframe src="index.html?embed#tracking"></iframe></div></div></div>
    <div class="col"><div class="label">07 · ACTIVITY</div><div class="phone"><div class="frame"><iframe src="index.html?embed#activity"></iframe></div></div></div>
    <div class="col"><div class="label">08 · ACCOUNT</div><div class="phone"><div class="frame"><iframe src="index.html?embed#account"></iframe></div></div></div>
  </div>

  <div class="part">PART 2 · STAFF</div>
  <div class="grid">
    <div class="col"><div class="label">09 · RUNNER · QUEUE</div><div class="phone"><div class="frame"><iframe src="staff.html?embed#queue"></iframe></div></div></div>
    <div class="col"><div class="label">10 · RUNNER · ROUTE</div><div class="phone"><div class="frame"><iframe src="staff.html?embed#route"></iframe></div></div></div>
    <div class="col"><div class="label">11 · 21+ ID CHECK</div><div class="phone"><div class="frame"><iframe src="staff.html?embed#idcheck"></iframe></div></div></div>
    <div class="col"><div class="label">12 · MANAGER · LIVE</div><div class="phone"><div class="frame"><iframe src="staff.html?embed#manager"></iframe></div></div></div>
  </div>
</div>
</body>
</html>
