<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Space Grotesk',-apple-system,sans-serif; }
  body { width:1200px; background:#050505; color:#fff; }
  .half { padding:60px 70px; }
  .half.light { background:#f2f6f1; color:#0b0f0c; }
  .lab { font-size:12px; font-weight:700; letter-spacing:3px; color:#8a8a8a; margin-bottom:34px; }
  .lockup { display:flex; align-items:center; gap:24px; }
  .lockup img { width:96px; height:96px; }
  .word { font-size:52px; font-weight:700; letter-spacing:-1.5px; line-height:1; }
  .word .sips { color:#3ddc6e; }
  .light .word .sips { color:#1fa04e; }
  .tag { font-size:16px; color:#8a8a8a; margin-top:10px; font-weight:500; letter-spacing:.2px; }
  .light .tag { color:#5a6b5e; }
  .row { display:flex; gap:46px; align-items:flex-end; margin-top:56px; }
  .cell { display:flex; flex-direction:column; gap:14px; align-items:center; }
  .cell .cap { font-size:11.5px; font-weight:600; letter-spacing:1.5px; color:#666; }
  .appicon { border-radius:22.5%; overflow:hidden; box-shadow:0 18px 40px rgba(0,0,0,.45); }
  .light .appicon { box-shadow:0 18px 40px rgba(30,60,40,.25); }
  .pillbtn { background:#3ddc6e; color:#04230f; font-weight:700; font-size:15px; padding:14px 26px; border-radius:999px; display:flex; align-items:center; gap:10px; }
  .pillbtn img { width:22px; height:22px; }
</style>
</head>
<body>
  <div class="half">
    <div class="lab">FAIRWAY SIPS · LOGO SYSTEM · ON DARK</div>
    <div class="lockup">
      <img src="logo.svg">
      <div>
        <div class="word">Fairway <span class="sips">Sips</span></div>
        <div class="tag">Drinks delivered to your hole.</div>
      </div>
    </div>
    <div class="row">
      <div class="cell"><div class="appicon"><img src="logo.svg" width="120" height="120" style="display:block;"></div><div class="cap">APP ICON</div></div>
      <div class="cell"><div class="appicon"><img src="logo.svg" width="76" height="76" style="display:block;"></div><div class="cap">76px</div></div>
      <div class="cell"><div class="appicon"><img src="logo.svg" width="44" height="44" style="display:block;"></div><div class="cap">44px</div></div>
      <div class="cell"><div class="pillbtn"><img src="logo.svg">Order to my hole</div><div class="cap">IN-PRODUCT</div></div>
    </div>
  </div>
  <div class="half light">
    <div class="lab" style="color:#7d8a80;">ON LIGHT · COURSE MATERIALS, DECKS, PRINT</div>
    <div class="lockup">
      <img src="logo.svg">
      <div>
        <div class="word">Fairway <span class="sips">Sips</span></div>
        <div class="tag">The flagstick is the straw. One mark, says both halves of the business.</div>
      </div>
    </div>
  </div>
</body>
</html>
